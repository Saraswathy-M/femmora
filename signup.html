<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup</title>

<style>
body {
    background-color: #d8b4b4;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    width: 320px;
    padding: 25px;
    background: #ffffff30;
    backdrop-filter: blur(10px);
    border-radius: 20px;
    text-align: center;
    box-shadow: 0px 8px 20px rgba(0,0,0,0.15);
}

h2 {
    font-family: "Brush Script MT", cursive;
    font-size: 2.2rem;
    margin-bottom: 20px;
    color: #5a3e45;
}

label {
    display: block;
    font-size: 0.9rem;
    margin-bottom: 5px;
    text-align: left;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border: none;
    border-radius: 8px;
    background-color: #e0f7f4;
    font-size: 0.9rem;
}

input:focus {
    outline: none;
    box-shadow: 0 0 5px #BA8699;
}


button {
    background-color: #e0f7f4;
    border: none;
    padding: 10px 25px;
    font-size: 1rem;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

button:hover {
    background-color: #BA8699;
    color: white;
}
</style>
</head>

<body>

<div class="container">
    <h2>Start your glow ♥</h2>

    <form id="signupForm">
        <label>Username</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label>Date of Birth</label>
        <input type="date" id="dob" required>

        <label>Address</label>
        <input type="text" id="address" placeholder="Your address" required>

        <label>Contact Number</label>
        <input type="tel" id="phone" placeholder="9876543210" required>

        <label>Pin Code</label>
        <input type="text" id="pincode" placeholder="6 digit code" required>

        <button type="submit">Signup ✨</button>
    </form>
</div>

<script>
document.getElementById("signupForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let user = {
        name: document.getElementById("name").value,
        dob: document.getElementById("dob").value,
        address: document.getElementById("address").value,
        phone: document.getElementById("phone").value,
        pincode: document.getElementById("pincode").value
    };

    localStorage.setItem("user", JSON.stringify(user));
    alert("Signup successful! 💖");

    window.location.href = "index.html";
});
</script>

</body>
</html>
